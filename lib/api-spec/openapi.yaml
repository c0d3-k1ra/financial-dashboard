openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SurplusEngine Finance API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Transaction operations
  - name: monthly-config
    description: Monthly configuration
  - name: budget-goals
    description: Budget goal operations
  - name: goals
    description: Dynamic savings goals
  - name: dashboard
    description: Dashboard summary
  - name: budget-analysis
    description: Budget analysis
  - name: surplus
    description: Surplus engine
  - name: accounts
    description: Account operations
  - name: categories
    description: Category operations
  - name: ai
    description: AI-powered natural language actions
  - name: transfers
    description: Transfer operations
  - name: trends
    description: Trend analytics
  - name: analytics
    description: Category analytics and CC dues
  - name: settings
    description: Application settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions
      parameters:
        - name: month
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: cycleStart
          in: query
          schema:
            type: string
        - name: cycleEnd
          in: query
          schema:
            type: string
        - name: accountId
          in: query
          schema:
            type: string
        - name: amountMin
          in: query
          schema:
            type: string
        - name: amountMax
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransaction"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/parse-natural:
    post:
      operationId: parseNaturalTransaction
      tags: [transactions]
      summary: Parse a natural language transaction description using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseNaturalTransactionRequest"
      responses:
        "200":
          description: Parsed transaction fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParseNaturalTransactionResponse"

  /ai/parse:
    post:
      operationId: aiParse
      tags: [ai]
      summary: Parse natural language input and execute or return structured data based on intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiParseRequest"
      responses:
        "200":
          description: Intent-based response with either parsed transaction fields or confirmation of created entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiParseResponse"

  /ai/chat:
    post:
      operationId: aiChat
      tags: [transactions]
      summary: Multi-turn conversational AI transaction parser with slot-filling
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: AI chat response with either a question, confirmation, or status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"

  /transactions/{id}:
    put:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransaction"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /monthly-config:
    get:
      operationId: listMonthlyConfigs
      tags: [monthly-config]
      summary: List monthly configs
      responses:
        "200":
          description: List of monthly configs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyConfig"
    post:
      operationId: upsertMonthlyConfig
      tags: [monthly-config]
      summary: Create or update monthly config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonthlyConfig"
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyConfig"

  /monthly-config/{id}:
    delete:
      operationId: deleteMonthlyConfig
      tags: [monthly-config]
      summary: Delete a monthly config
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /budget-goals:
    get:
      operationId: listBudgetGoals
      tags: [budget-goals]
      summary: List budget goals
      responses:
        "200":
          description: List of budget goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BudgetGoal"
    post:
      operationId: upsertBudgetGoal
      tags: [budget-goals]
      summary: Create or update a budget goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetGoal"
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetGoal"

  /budget-goals/{id}:
    delete:
      operationId: deleteBudgetGoal
      tags: [budget-goals]
      summary: Delete a budget goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /budget-analysis:
    get:
      operationId: getBudgetAnalysis
      tags: [budget-analysis]
      summary: Get planned vs actual budget analysis
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Budget analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetAnalysisResponse"

  /surplus/distribute:
    post:
      operationId: distributeSurplus
      tags: [surplus]
      summary: Distribute monthly surplus across goals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DistributeRequest"
      responses:
        "200":
          description: Distribution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistributeResult"

  /surplus/monthly:
    get:
      operationId: getMonthlySurplus
      tags: [surplus]
      summary: Get computed monthly surplus for a given month
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Monthly surplus info
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                  surplus:
                    type: string
                required:
                  - month
                  - surplus

  /surplus/undo:
    post:
      operationId: undoSurplusDistribution
      tags: [surplus]
      summary: Undo the most recent surplus distribution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UndoSurplusRequest"
      responses:
        "200":
          description: Undo result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UndoSurplusResult"

  /surplus/can-undo:
    get:
      operationId: canUndoSurplus
      tags: [surplus]
      summary: Check if the most recent distribution can be undone
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Undo availability info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanUndoSurplusResult"

  /surplus/allocations:
    get:
      operationId: listSurplusAllocations
      tags: [surplus]
      summary: List surplus allocation history
      responses:
        "200":
          description: List of allocations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SurplusAllocation"

  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List all goals with intelligence data
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GoalItem"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Create a new goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGoal"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalItem"

  /goals/{id}:
    put:
      operationId: updateGoal
      tags: [goals]
      summary: Update a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGoal"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalItem"
    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /goals/waterfall:
    get:
      operationId: getGoalsWaterfall
      tags: [goals]
      summary: Get waterfall data for goals vs liquid cash
      responses:
        "200":
          description: Waterfall data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaterfallData"

  /goals/{id}/projection:
    get:
      operationId: getGoalProjectionById
      tags: [goals]
      summary: Get goal projection with history and forward projections
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Projection data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectionPoint"

  /accounts/{id}/reconcile:
    post:
      operationId: reconcileAccount
      tags: [accounts]
      summary: Reconcile account balance with actual bank statement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconcileRequest"
      responses:
        "200":
          description: Reconciliation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconcileResult"

  /transactions/recent:
    get:
      operationId: getRecentTransactions
      tags: [transactions]
      summary: Get recent transactions across all months
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Recent transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /dashboard/monthly-trend:
    get:
      operationId: getMonthlyTrend
      tags: [dashboard]
      summary: Get income vs expense trend for last 6 months
      responses:
        "200":
          description: Monthly trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyTrendPoint"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List all accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountItem"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccount"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountItem"

  /accounts/{id}:
    put:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccount"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountItem"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /accounts/process-emis:
    post:
      operationId: processEmis
      tags: [accounts]
      summary: Process EMI payments for a given month
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessEmis"
      responses:
        "200":
          description: EMI processing result
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: integer
                  message:
                    type: string
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        accountName:
                          type: string
                        emiAmount:
                          type: string
                        newBalance:
                          type: string
                      required:
                        - accountName
                        - emiAmount
                        - newBalance
                required:
                  - processed

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      parameters:
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryItem"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategory"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryItem"

  /categories/{id}:
    patch:
      operationId: renameCategory
      tags: [categories]
      summary: Rename a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameCategory"
      responses:
        "200":
          description: Renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryItem"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /transfers:
    post:
      operationId: createTransfer
      tags: [transfers]
      summary: Transfer money between accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransfer"
      responses:
        "201":
          description: Transfer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /trends/cc-spend:
    get:
      operationId: getCcSpendTrend
      tags: [trends]
      summary: Get CC spending totals per billing cycle (last 6 cycles)
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CC spend trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CcSpendPoint"

  /trends/living-expenses:
    get:
      operationId: getLivingExpensesTrend
      tags: [trends]
      summary: Get living expenses for last 6 billing cycles
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Living expenses trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LivingExpensesPoint"

  /billing-cycles:
    get:
      operationId: listBillingCycles
      tags: [dashboard]
      summary: List available billing cycles
      responses:
        "200":
          description: Available billing cycles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingCycle"

  /analytics/spend-by-category:
    get:
      operationId: getSpendByCategory
      tags: [analytics]
      summary: Get category-wise expense breakdown for a billing cycle
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
        - name: accountType
          in: query
          required: false
          schema:
            type: string
            enum: [all, cc, non_cc]
      responses:
        "200":
          description: Category spend breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySpendItem"

  /analytics/category-trend:
    get:
      operationId: getCategoryTrend
      tags: [analytics]
      summary: Get per-category expense trend over last 6 billing cycles
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryTrendItem"

  /analytics/cc-dues:
    get:
      operationId: getCcDues
      tags: [analytics]
      summary: Get credit card payment due information
      responses:
        "200":
          description: CC dues info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CcDueItem"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get application settings
      responses:
        "200":
          description: Application settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update application settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

  /settings/reset-data:
    post:
      operationId: resetData
      tags: [settings]
      summary: Reset all transaction data (keeps categories and settings)
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetDataResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Transaction:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        amount:
          type: string
        description:
          type: string
        category:
          type: string
        type:
          type: string
        accountId:
          type: integer
          nullable: true
        toAccountId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - date
        - amount
        - description
        - category
        - type
        - createdAt

    CreateTransaction:
      type: object
      properties:
        date:
          type: string
        amount:
          type: string
        description:
          type: string
        category:
          type: string
        type:
          type: string
        accountId:
          type: integer
      required:
        - date
        - amount
        - description
        - category
        - type
        - accountId

    MonthlyConfig:
      type: object
      properties:
        id:
          type: integer
        month:
          type: string
        startingBalance:
          type: string
      required:
        - id
        - month
        - startingBalance

    CreateMonthlyConfig:
      type: object
      properties:
        month:
          type: string
        startingBalance:
          type: string
      required:
        - month
        - startingBalance

    BudgetGoal:
      type: object
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        category:
          type: string
        plannedAmount:
          type: string
      required:
        - id
        - categoryId
        - category
        - plannedAmount

    CreateBudgetGoal:
      type: object
      properties:
        categoryId:
          type: integer
        plannedAmount:
          type: string
      required:
        - categoryId
        - plannedAmount

    DashboardSummary:
      type: object
      properties:
        bankBalance:
          type: string
        unpaidCcDues:
          type: string
        netLiquidity:
          type: string
        totalIncome:
          type: string
        totalExpenses:
          type: string
        bankExpenses:
          type: string
        ccExpenses:
          type: string
        nonCcExpenses:
          type: string
        ccTransfers:
          type: string
        monthlySurplus:
          type: string
        burnRate:
          type: number
        plannedExpenses:
          type: string
        actualExpenses:
          type: string
        startingBalance:
          type: string
        endBalance:
          type: string
        totalLoanOutstanding:
          type: string
        totalEmiDue:
          type: string
      required:
        - bankBalance
        - unpaidCcDues
        - netLiquidity
        - totalIncome
        - totalExpenses
        - bankExpenses
        - ccExpenses
        - nonCcExpenses
        - ccTransfers
        - monthlySurplus
        - burnRate
        - plannedExpenses
        - actualExpenses
        - startingBalance
        - endBalance
        - totalLoanOutstanding
        - totalEmiDue

    BudgetAnalysisResponse:
      type: object
      properties:
        daysElapsed:
          type: integer
        totalCycleDays:
          type: integer
        rows:
          type: array
          items:
            $ref: "#/components/schemas/BudgetAnalysisRow"
      required:
        - daysElapsed
        - totalCycleDays
        - rows

    BudgetAnalysisRow:
      type: object
      properties:
        categoryId:
          type: integer
        budgetGoalId:
          type: integer
          nullable: true
        category:
          type: string
        planned:
          type: string
